name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "TAG=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/loom-release.keystore \
            -storetype PKCS12 \
            -alias loom \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass loom1234 \
            -keypass loom1234 \
            -dname "CN=Loom, OU=Dev, O=Loom, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        env:
          KEYSTORE_PATH: loom-release.keystore
          KEYSTORE_PASSWORD: loom1234
          KEY_ALIAS: loom
          KEY_PASSWORD: loom1234
        run: cd android && ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found at $APK_PATH"
            echo "Available files in build outputs:"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "APK found at $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Rename APK
        run: |
          APK_DIR="android/app/build/outputs/apk/release"
          mv "$APK_DIR/app-release.apk" "$APK_DIR/loom-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loom-release-apk
          path: android/app/build/outputs/apk/release/loom-v${{ steps.version.outputs.VERSION }}.apk
          retention-days: 30

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: loom-release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Loom v${{ needs.build.outputs.version }}
          tag_name: ${{ needs.build.outputs.tag }}
          body: |
            ## Loom v${{ needs.build.outputs.version }}

            ### What's New
            <!-- Add release notes here -->

            ### Installation
            - **Web**: Visit [GitHub Pages](https://markocampos.github.io/Loom/)
            - **Android**: Download the APK from Assets below

            ### Assets
            - `loom-v${{ needs.build.outputs.version }}.apk` - Android app
          draft: false
          prerelease: false
          files: |
            loom-v${{ needs.build.outputs.version }}.apk
