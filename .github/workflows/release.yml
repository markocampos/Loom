name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Loom v${{ steps.version.outputs.VERSION }}
          body: |
            ## Loom v${{ steps.version.outputs.VERSION }}

            ### What's New
            <!-- Add release notes here -->

            ### Installation
            - **Web**: Visit [GitHub Pages](https://username.github.io/loom/)
            - **Android**: Download the APK from Assets below

            ### Assets
            - `loom-v${{ steps.version.outputs.VERSION }}.apk` - Android app
          draft: false
          prerelease: false
          files: |
            dist/**
