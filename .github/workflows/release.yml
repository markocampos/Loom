name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "TAG=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        uses: softprops/action-gh-release@v1
        with:
          name: Loom v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.TAG }}
          body: |
            ## Loom v${{ steps.version.outputs.VERSION }}

            ### What's New
            <!-- Add release notes here -->

            ### Installation
            - **Web**: Visit [GitHub Pages](https://markocampos.github.io/Loom/)
            - **Android**: Download the APK from Assets below

            ### Assets
            - `loom-v${{ steps.version.outputs.VERSION }}.apk` - Android app
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
