name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/loom-release.keystore \
            -storetype PKCS12 \
            -alias loom \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass loom1234 \
            -keypass loom1234 \
            -dname "CN=Loom, OU=Dev, O=Loom, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        env:
          KEYSTORE_PATH: loom-release.keystore
          KEYSTORE_PASSWORD: loom1234
          KEY_ALIAS: loom
          KEY_PASSWORD: loom1234
        run: cd android && ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found at $APK_PATH"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "APK found at $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loom-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
